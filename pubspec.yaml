name: stayhub
description: "Hostel booking & management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- FIREBASE ---
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.3
  
  # --- CLOUD STORAGE ---
  cloudinary_public: ^0.23.1

  # --- AUTH ---
  google_sign_in: ^6.1.6

  # --- STATE MANAGEMENT ---
  provider: ^6.1.1

  # --- UI & DESIGN ---
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11

  # --- MEDIA & FILES ---
  image_picker: ^1.0.4
  video_player: ^2.8.1
  cached_network_image: ^3.3.0

  # --- UTILITIES ---
  intl: any
  url_launcher: ^6.2.1
  package_info_plus: ^8.0.0
  shared_preferences: ^2.2.3 # Added for caching

  # --- MAPS ---
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  fl_chart: ^1.1.1
  uuid: ^4.5.2
  share_plus: ^10.0.0
  flutter_paystack_plus: ^1.0.9
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0
  flutter_cache_manager: ^3.4.1
  location: ^7.0.0

dependency_overrides:
  intl: any
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/

flutter_native_splash:
  color: "#0F2027"
  image: assets/logo/logo.png
  
  android_12:
    image: assets/logo/logo.png
    color: "#0F2027"
    icon_background_color: "#0F2027"
